<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manus Pipeline Executor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    h1 {
      color: #667eea;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .tab-button {
      padding: 10px 20px;
      border: none;
      background: #f0f0f0;
      color: #333;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .tab-button.active {
      background: #667eea;
      color: white;
    }

    .tab-button:hover {
      background: #667eea;
      color: white;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .card h2 {
      color: #667eea;
      margin-bottom: 15px;
      font-size: 18px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-family: inherit;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button {
      background: #667eea;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    button:hover {
      background: #5568d3;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .progress-container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      margin-top: 20px;
    }

    .stage {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 5px;
    }

    .stage-status {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 15px;
      font-weight: bold;
      color: white;
    }

    .stage-status.pending {
      background: #ccc;
    }

    .stage-status.running {
      background: #667eea;
      animation: pulse 1s infinite;
    }

    .stage-status.completed {
      background: #4caf50;
    }

    .stage-status.error {
      background: #f44336;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .stage-name {
      flex: 1;
      font-weight: 500;
    }

    .logs-container {
      background: #1e1e1e;
      color: #00ff00;
      padding: 15px;
      border-radius: 5px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
      margin-top: 15px;
    }

    .log-entry {
      margin-bottom: 5px;
      word-break: break-all;
    }

    .log-entry.info { color: #00ff00; }
    .log-entry.success { color: #4caf50; }
    .log-entry.error { color: #f44336; }
    .log-entry.warning { color: #ff9800; }

    .deployment-info {
      background: #f0f0f0;
      padding: 15px;
      border-radius: 5px;
      margin-top: 15px;
    }

    .deployment-link {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }

    .deployment-link:hover {
      text-decoration: underline;
    }

    .status-badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      margin-left: 10px;
    }

    .status-badge.running {
      background: #e3f2fd;
      color: #1976d2;
    }

    .status-badge.completed {
      background: #e8f5e9;
      color: #388e3c;
    }

    .status-badge.error {
      background: #ffebee;
      color: #d32f2f;
    }

    .deployments-list {
      margin-top: 20px;
    }

    .deployment-item {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 10px;
      border-left: 4px solid #667eea;
    }

    .deployment-item h4 {
      color: #333;
      margin-bottom: 10px;
    }

    .deployment-item p {
      color: #666;
      font-size: 14px;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🚀 Manus Pipeline Executor</h1>
      <p class="subtitle">Execute o pipeline sobre seus repositórios e veja as alterações em tempo real</p>
    </header>

    <div class="card" style="margin-bottom: 20px;">
      <div style="display:flex; align-items:center; justify-content:space-between; cursor:pointer" onclick="toggleConfig()">
        <h2 style="margin:0">⚙️ Configuração</h2>
        <span id="configArrow">▼</span>
      </div>
      <div id="configPanel" style="display:none; margin-top:15px;">
        <div class="form-group">
          <label for="apiKeyInput">API Key (x-api-key):</label>
          <input type="password" id="apiKeyInput" placeholder="sua-api-key" oninput="API_KEY = this.value">
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-button active" onclick="switchTab('simple')">📝 Pipeline Simples</button>
      <button class="tab-button" onclick="switchTab('external')">🔗 Pipeline Externo</button>
      <button class="tab-button" onclick="switchTab('deployments')">📊 Deployments Ativos</button>
    </div>

    <!-- Tab 1: Simple Pipeline -->
    <div id="simple" class="tab-content active">
      <div class="grid">
        <div class="card">
          <h2>📝 Requisição</h2>
          <div class="form-group">
            <label for="requirement">Descreva a alteração desejada:</label>
            <textarea id="requirement" placeholder="Ex: Adicionar ordenação na tabela de dados..."></textarea>
          </div>
          <button onclick="executePipeline()">Executar Pipeline</button>
        </div>

        <div class="card">
          <h2>📋 Histórico</h2>
          <div id="history" style="max-height: 300px; overflow-y: auto;"></div>
        </div>
      </div>
    </div>

    <!-- Tab 2: External Pipeline -->
    <div id="external" class="tab-content">
      <div class="grid">
        <div class="card">
          <h2>🔗 Repositório Externo</h2>
          <div class="form-group">
            <label for="repoUrl">URL do Repositório GitHub:</label>
            <input type="text" id="repoUrl" placeholder="https://github.com/usuario/repositorio">
          </div>
          <div class="form-group">
            <label for="githubToken">Token GitHub (opcional, para repositórios privados):</label>
            <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx">
          </div>
          <div class="form-group">
            <label for="externalRequirement">Descreva a alteração desejada:</label>
            <textarea id="externalRequirement" placeholder="Ex: Adicionar ordenação na tabela de dados..."></textarea>
          </div>
          <button onclick="executeExternalPipeline()">Executar Pipeline</button>
        </div>

        <div class="card">
          <h2>📊 Status da Execução</h2>
          <div id="externalStatus" style="color: #666; font-size: 14px;">Aguardando execução...</div>
        </div>
      </div>
    </div>

    <!-- Tab 3: Active Deployments -->
    <div id="deployments" class="tab-content">
      <div class="card">
        <h2>🖥️ Deployments em Execução</h2>
        <button onclick="loadDeployments()" style="margin-bottom: 15px;">🔄 Atualizar</button>
        <div id="deploymentsList" class="deployments-list"></div>
      </div>
    </div>

    <!-- Pipeline Progress -->
    <div id="progressContainer" class="progress-container" style="display: none;">
      <h2>📊 Progresso do Pipeline</h2>
      <div id="pipelineProgress"></div>
      <div id="logsContainer" class="logs-container"></div>
    </div>
  </div>

  <script>
    let currentPipelineId = null;
    let currentExecutionId = null;
    let monitoringInterval = null;
    let API_KEY = '';

    function toggleConfig() {
      const panel = document.getElementById('configPanel');
      const arrow = document.getElementById('configArrow');
      panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
      arrow.textContent = panel.style.display === 'none' ? '▼' : '▲';
    }

    function authHeaders(extra = {}) {
      return { 'Content-Type': 'application/json', 'x-api-key': API_KEY, ...extra };
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
      if (tabName === 'deployments') loadDeployments();
    }

    async function executePipeline() {
      const requirement = document.getElementById('requirement').value.trim();
      if (!requirement) {
        alert('Por favor, descreva a alteração desejada');
        return;
      }

      try {
        const response = await fetch('/api/pipeline/execute', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ requirement })
        });

        const data = await response.json();

        if (data.status === 'blocked_by_qa') {
          document.getElementById('progressContainer').style.display = 'block';
          document.getElementById('logsContainer').innerHTML =
            `<div class="log-entry error">🚫 Pipeline bloqueado pelo QA: ${data.reason || ''}</div>`;
          loadPipelineHistory();
          return;
        }

        currentPipelineId = data.pipelineId;
        document.getElementById('progressContainer').style.display = 'block';
        monitorPipeline(data.pipelineId);
      } catch (error) {
        alert('Erro ao executar pipeline: ' + error.message);
      }
    }

    async function executeExternalPipeline() {
      const repositoryUrl = document.getElementById('repoUrl').value.trim();
      const requirement = document.getElementById('externalRequirement').value.trim();
      const githubToken = document.getElementById('githubToken').value.trim();

      if (!repositoryUrl || !requirement) {
        alert('Por favor, preencha a URL do repositório e a requisição');
        return;
      }

      try {
        const response = await fetch('/api/pipeline/external', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({
            repositoryUrl,
            requirement,
            githubToken: githubToken || undefined
          })
        });

        const data = await response.json();
        currentExecutionId = data.executionId;
        currentPipelineId = data.pipelineId;

        const statusDiv = document.getElementById('externalStatus');
        statusDiv.innerHTML = `
          <p><strong>Execução ID:</strong> ${data.executionId}</p>
          <p><strong>Repositório:</strong> ${data.repository?.name} (${data.repository?.type})</p>
          <p><strong>Porta Alocada:</strong> <a href="${data.deployment?.url}" target="_blank" class="deployment-link">${data.deployment?.port}</a></p>
          <p><strong>Status:</strong> <span class="status-badge running">Processando...</span></p>
        `;

        if (data.pullRequest) {
          statusDiv.innerHTML += `<p><strong>Pull Request:</strong> <a href="${data.pullRequest.url}" target="_blank" class="deployment-link">#${data.pullRequest.number} — Ver no GitHub</a></p>`;
        }
        if (data.status === 'blocked_by_qa') {
          statusDiv.innerHTML += `<p style="color:#d32f2f"><strong>QA bloqueou:</strong> ${data.reason}</p>`;
        }

        document.getElementById('progressContainer').style.display = 'block';
        monitorPipeline(data.pipelineId);
      } catch (error) {
        alert('Erro ao executar pipeline externo: ' + error.message);
      }
    }

    function monitorPipeline(pipelineId) {
      if (monitoringInterval) { clearInterval(monitoringInterval); monitoringInterval = null; }

      // Stage metadata — ordered by stageIndex
      const STAGES = [
        { key: 'specification', label: '📝 Especificação' },
        { key: 'analysis',      label: '📊 Análise' },
        { key: 'ux_design',     label: '🎨 Design UI/UX' },
        { key: 'development',   label: '💻 Desenvolvimento' },
        { key: 'qa',            label: '🧪 QA/Testes' },
        { key: 'deployment',    label: '🚀 DevOps' },
      ];
      const completed = new Set();

      function renderStages() {
        document.getElementById('pipelineProgress').innerHTML = STAGES.map(s => `
          <div class="stage">
            <div class="stage-status ${completed.has(s.key) ? 'completed' : 'pending'}">${completed.has(s.key) ? '✓' : '○'}</div>
            <div class="stage-name">${s.label}</div>
          </div>`).join('');
      }
      renderStages();

      const evtSource = new EventSource(
        `/api/pipeline/${pipelineId}/stream?api_key=${encodeURIComponent(API_KEY)}`
      );

      evtSource.addEventListener('progress', (e) => {
        const data = JSON.parse(e.data);
        completed.add(data.stage);
        renderStages();
        const label = STAGES.find(s => s.key === data.stage)?.label || data.stage;
        const logs = document.getElementById('logsContainer');
        logs.innerHTML += `<div class="log-entry success">✅ ${label} — ${data.duration}</div>`;
        logs.scrollTop = logs.scrollHeight;
      });

      evtSource.addEventListener('done', () => {
        evtSource.close();
        loadPipelineHistory();
      });

      evtSource.addEventListener('blocked_by_qa', (e) => {
        const data = JSON.parse(e.data);
        evtSource.close();
        document.getElementById('logsContainer').innerHTML +=
          `<div class="log-entry error">🚫 Pipeline bloqueado pelo QA: ${escapeHtml(data.reason || '')}</div>`;
        loadPipelineHistory();
      });

      evtSource.addEventListener('error', (e) => {
        if (e.data) {
          const data = JSON.parse(e.data);
          evtSource.close();
          document.getElementById('logsContainer').innerHTML +=
            `<div class="log-entry error">❌ Erro: ${escapeHtml(data.message || 'Erro desconhecido')}</div>`;
        }
      });
    }

    async function loadDeployments() {
      try {
        const response = await fetch('/api/deployments', { headers: { 'x-api-key': API_KEY } });
        const data = await response.json();

        let html = '';
        if (!data.deployments || data.deployments.length === 0) {
          html = '<p>Nenhum deployment ativo</p>';
        } else {
          data.deployments.forEach(dep => {
            html += `
              <div class="deployment-item">
                <h4>Execução: ${dep.executionId}</h4>
                <p><strong>Porta:</strong> ${dep.port}</p>
                <p><strong>URL:</strong> <a href="${dep.url}" target="_blank" class="deployment-link">${dep.url}</a></p>
                <p><strong>Status:</strong> <span class="status-badge ${dep.isActive ? 'running' : 'error'}">${dep.isActive ? 'Rodando' : 'Parado'}</span></p>
              </div>
            `;
          });
        }

        document.getElementById('deploymentsList').innerHTML = html;
      } catch (error) {
        console.error('Erro ao carregar deployments:', error);
      }
    }

    async function loadPipelineHistory() {
      try {
        const response = await fetch('/api/pipeline', { headers: { 'x-api-key': API_KEY } });
        const data = await response.json();

        let html = '';
        (data.pipelines || []).slice(0, 10).forEach(exec => {
          html += `
            <div style="padding: 10px; background: #f9f9f9; border-radius: 5px; margin-bottom: 10px;">
              <strong>${escapeHtml(exec.requirement || exec.pipelineId)}</strong>
              <p style="font-size: 12px; color: #666; margin-top: 5px;">
                ${exec.fileCount} arquivo(s) · ${new Date(exec.createdAt).toLocaleString('pt-BR')}
              </p>
            </div>
          `;
        });

        document.getElementById('history').innerHTML = html || '<p>Nenhuma execução ainda</p>';
      } catch (error) {
        console.error('Erro ao carregar histórico:', error);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Load history on page load
    loadPipelineHistory();
  </script>
</body>
</html>
